app = "claude-peers-broker"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 7899
  force_https = true

[env]
  CLAUDE_PEERS_BROKER_HOST = "0.0.0.0"
  CLAUDE_PEERS_PORT = "7899"
  CLAUDE_PEERS_DB_PATH = "/data/claude-peers.db"

[mounts]
  source = "peers_data"
  destination = "/data"
